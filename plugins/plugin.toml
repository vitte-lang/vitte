name = "vitte-analyzer-pack"
version = "1.0.0"
abi = "v1"
library = "plugins/vitte_analyzer_pack.cpp"

[[command]]
name = "vitte-analyzer.completion"
payload_schema = "v1"
permissions = ["file:read"]

[[command]]
name = "vitte-analyzer.hover"
payload_schema = "v1"
permissions = ["file:read"]

[[command]]
name = "vitte-analyzer.signature"
payload_schema = "v1"
permissions = ["file:read"]

[[command]]
name = "vitte-analyzer.refs"
payload_schema = "v1"
permissions = ["file:read"]

[[command]]
name = "vitte-analyzer.goto"
payload_schema = "v1"
permissions = ["file:read"]

[[command]]
name = "vitte-process.doctor"
payload_schema = "v2"
permissions = ["file:read", "process:exec"]

[[command]]
name = "vitte-http.doctor"
payload_schema = "v2"
permissions = ["file:read", "net:outbound"]

[[command]]
name = "vitte-security-lint.run"
payload_schema = "v2"
permissions = ["file:read", "net:outbound"]

[[command]]
name = "vitte-lint.quickfix-config.preview"
payload_schema = "v2"
permissions = ["file:read"]

[[command]]
name = "vitte-lint.quickfix-config.apply"
payload_schema = "v2"
permissions = ["file:read", "file:write"]
