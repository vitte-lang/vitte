# Geany snippets for Vitte.
# Install by appending this file into ~/.config/geany/snippets.conf

[vitte]
entry_main=entry main at core/app {\n\t%cursor%\n\tgive 0\n}
proc=proc %cursor%() {\n\t%cursor%\n}
form=form %cursor% {\n\t%cursor%\n}
trait=trait %cursor% {\n\t%cursor%\n}
type=type %cursor% = bool
pick=pick %cursor% {\n\tcase %cursor% {\n\t\t%cursor%\n\t}\n}
match=match %cursor% {\n\tcase %cursor% {\n\t\t%cursor%\n\t}\n}
when=when %cursor% {\n\t%cursor%\n}
space=space %cursor%
pull=pull %cursor%
share=share %cursor%
use=use %cursor%
field=field %cursor%: bool
const=const %cursor% = 0
macro=macro %cursor%() {\n\t%cursor%\n}
unsafe=unsafe {\n\t%cursor%\n}
loop=loop {\n\t%cursor%\n}
forin=for %cursor% in %cursor% {\n\t%cursor%\n}
ifelse=if %cursor% {\n\t%cursor%\n} else {\n\t%cursor%\n}
select=select %cursor% {\n\tcase %cursor% {\n\t\t%cursor%\n\t}\n}
role_contract=<<< ROLE-CONTRACT\n%cursor%\n>>>
diag_api=diagnostics_%cursor%()
quickfix_api=quickfix_%cursor%()
doctor_api=doctor_%cursor%()

