# Geany snippets for Vitte.
# Install: editors/geany/install_geany.sh appends these sections to snippets.conf.

[vitte]

# Module / imports
space=space %cursor%
space_pkg=space %cursor%/package
use=use %cursor%
use_as=use %cursor% as %cursor%_pkg
pull=pull %cursor%
share=share %cursor%
share_all=share *
export=export *
at=at %cursor%

# Entrypoints
entry=entry %cursor% at %cursor% {\n\t%cursor%\n}
entry_main=entry main at core/app {\n\t%cursor%\n\tgive 0\n}
entry_tool=entry main at tools/%cursor% {\n\t%cursor%\n\tgive 0\n}

# Procedures
proc=proc %cursor%() {\n\t%cursor%\n}
proc_ret=proc %cursor%() -> int {\n\t%cursor%\n\tgive 0\n}
proc_arg=proc %cursor%(value: int) -> int {\n\tgive value\n}
proc_bool=proc %cursor%() -> bool {\n\tgive false\n}
proc_string=proc %cursor%() -> string {\n\tgive ""\n}

# Types
type=type %cursor% = int
alias=type %cursor% = %cursor%
form=form %cursor% {\n\tfield id: int\n\tfield name: string\n}
field=field %cursor%: %cursor%
pick=pick %cursor% {\n\tcase Ready\n\tcase Failed {\n\t\tfield message: string\n\t}\n}
case=case %cursor%
trait=trait %cursor% {\n\tproc %cursor%()\n}
macro=macro %cursor% {\n\t%cursor%\n}

# Constants / variables
const=const %cursor%: int = 0
const_string=const %cursor%: string = "%cursor%"
let=let %cursor%: int = 0
make=make %cursor% = 0
set=set %cursor% = %cursor%

# Control flow
if=if %cursor% {\n\t%cursor%\n}
ifelse=if %cursor% {\n\t%cursor%\n} else {\n\t%cursor%\n}
when=when %cursor% {\n\t%cursor%\n}
loop=loop {\n\t%cursor%\n}
forin=for %cursor% in %cursor% {\n\t%cursor%\n}
match=match %cursor% {\n\tcase %cursor% {\n\t\t%cursor%\n\t}\n\totherwise {\n\t\t%cursor%\n\t}\n}
select=select %cursor% {\n\tcase %cursor% {\n\t\t%cursor%\n\t}\n\totherwise {\n\t\t%cursor%\n\t}\n}
break=break
continue=continue

# Return / emit
give=give %cursor%
return=return %cursor%
emit=emit %cursor%

# Unsafe / asm
unsafe=unsafe {\n\t%cursor%\n}
asm=asm {\n\t%cursor%\n}

# Diagnostics / compiler APIs
diag=diagnostics_%cursor%()
diag_error=diagnostics_error("%cursor%")
diag_code=VITTE-H0001
quickfix=quickfix_%cursor%()
doctor=doctor_%cursor%()

# Compiler structures
phase=proc run_%cursor%_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
pass=proc %cursor%_pass(ctx: CompilerContext) -> DiagnosticReport {\n\t%cursor%\n}
verify=proc verify_%cursor%(ctx: CompilerContext) -> bool {\n\t%cursor%\n\tgive true\n}
lower=proc lower_%cursor%(ctx: CompilerContext) -> %cursor% {\n\t%cursor%\n}

# Tests
test=proc test_%cursor%() -> bool {\n\t%cursor%\n\tgive true\n}
smoke=proc smoke() -> bool {\n\t%cursor%\n\tgive true\n}
negative_test=proc test_%cursor%_must_fail() -> bool {\n\t%cursor%\n\tgive true\n}

# Comments / contracts
line_comment=// %cursor%
block_comment=/*\n * %cursor%\n */
zone=<<< %cursor%\n>>>
role_contract=<<< ROLE-CONTRACT\npackage: %cursor%\nrole: %cursor%\nsource_of_truth: %cursor%\nstatus: draft\n>>>
invariant=<<< INVARIANT\n%cursor%\n>>>
todo=<<< TODO\n%cursor%\n>>>
audit=<<< AUDIT\n%cursor%\n>>>

