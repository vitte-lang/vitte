# Geany snippets for Vitte
# Install: append into ~/.config/geany/snippets.conf

[vitte]

# ===== Module / imports =====
space=space %cursor%
use=use %cursor%
pull=pull %cursor%
share=share %cursor%
share_all=share *
from_import=from %cursor% import %cursor%

# ===== Entrypoints =====
entry_main=entry main at core/app {\n\t%cursor%\n\tgive 0\n}

entry_tool=entry main at tools/%cursor% {\n\tgive 0\n}

# ===== Procedures =====
proc=proc %cursor%() {\n\t%cursor%\n}

proc_ret=proc %cursor%() -> i32 {\n\t%cursor%\n\tgive 0\n}

proc_arg=proc %cursor%(value: i32) -> i32 {\n\tgive value\n}

# ===== Types =====
type=type %cursor% = bool

form=form %cursor% {\n\tfield id: i64\n\tfield name: string\n}

field=field %cursor%: bool

pick=pick %cursor% {\n\tcase Ready\n\tcase Failed {\n\t\tfield message: string\n\t}\n}

trait=trait %cursor% {\n\tproc %cursor%()\n}

# ===== Constants / variables =====
const=const %cursor%: i32 = 0

let=let %cursor%: i32 = 0

make=make %cursor% = 0

set=set %cursor% = %cursor%

# ===== Control flow =====
if=if %cursor% {\n\t%cursor%\n}

ifelse=if %cursor% {\n\t%cursor%\n} else {\n\t%cursor%\n}

when=when %cursor% {\n\t%cursor%\n}

loop=loop {\n\t%cursor%\n}

while=while %cursor% {\n\t%cursor%\n}

forin=for %cursor% in %cursor% {\n\t%cursor%\n}

match=match %cursor% {\n\tcase %cursor% {\n\t\t%cursor%\n\t}\n}

select=select %cursor% {\n\tcase %cursor% {\n\t\t%cursor%\n\t}\n\totherwise {\n\t\t%cursor%\n\t}\n}

# ===== Return / emit =====
give=give %cursor%

return=return %cursor%

emit=emit %cursor%

# ===== Unsafe / foreign =====
unsafe=unsafe {\n\t%cursor%\n}

foreign=foreign %cursor%

extern_proc=foreign proc %cursor%() -> i32

# ===== Diagnostics / compiler APIs =====
diag=diagnostic_%cursor%()

diag_error=diagnostic_error("%cursor%")

diag_code=diagnostic_message("%cursor%")

quickfix=quickfix_%cursor%()

doctor=doctor_%cursor%()

# ===== Compiler structures =====
phase=proc run_%cursor%_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}

pass=proc %cursor%_pass(ctx: CompilerContext) -> DiagnosticReport {\n\t%cursor%\n}

verify=proc verify_%cursor%(ctx: CompilerContext) -> bool {\n\t%cursor%\n}

lower=proc lower_%cursor%(ctx: CompilerContext) -> %cursor% {\n\t%cursor%\n}

# ===== Tests =====
test=proc test_%cursor%() -> bool {\n\t%cursor%\n\tgive true\n}

negative_test=proc test_%cursor%_must_fail() -> bool {\n\t%cursor%\n\tgive true\n}

# ===== Comments / contracts =====
zone=<<< %cursor%\n>>>

role_contract=<<< ROLE-CONTRACT\nPurpose:\n- %cursor%\n\nInputs:\n- \n\nOutputs:\n- \n\nInvariants:\n- \n>>>

invariant=<<< INVARIANT\n%cursor%\n>>>

todo=<<< TODO\n%cursor%\n>>>

audit=<<< AUDIT\n%cursor%\n>>>


