# Compiler
phase=proc run_%cursor%_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
phase_result=let result: PhaseResult = run_%cursor%_phase(session);
pass=proc %cursor%_pass(ctx: CompilerContext) -> DiagnosticReport {\n\t%cursor%\n}
verify=proc verify_%cursor%(ctx: CompilerContext) -> bool {\n\t%cursor%\n\tgive true;\n}
lower=proc lower_%cursor%(ctx: CompilerContext) -> %cursor% {\n\t%cursor%\n}
transform=proc transform_%cursor%(input: %cursor%) -> %cursor% {\n\t%cursor%\n}
analyze=proc analyze_%cursor%(ctx: CompilerContext) -> DiagnosticReport {\n\t%cursor%\n}
lexer_phase=proc run_lexer_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
parser_phase=proc run_parser_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
ast_phase=proc run_ast_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
hir_phase=proc run_hir_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
sema_phase=proc run_sema_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
typeck_phase=proc run_typeck_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
borrowck_phase=proc run_borrowck_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
mir_phase=proc run_mir_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
ir_phase=proc run_ir_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
backend_phase=proc run_backend_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
linker_phase=proc run_linker_phase(session: CompilationSession) -> PhaseResult {\n\t%cursor%\n}
pipeline=proc compile(session: CompilationSession) -> CompilationResult {\n\tlet tokens = run_lexer_phase(session);\n\tlet ast = run_parser_phase(session, tokens);\n\tlet hir = run_hir_phase(session, ast);\n\tlet sema = run_sema_phase(session, hir);\n\tlet typed = run_typeck_phase(session, sema);\n\tlet checked = run_borrowck_phase(session, typed);\n\tlet mir = run_mir_phase(session, checked);\n\tlet ir = run_ir_phase(session, mir);\n\tlet object = run_backend_phase(session, ir);\n\tgive run_linker_phase(session, object);\n}

# Tests
test=proc test_%cursor%() -> bool {\n\t%cursor%\n\tgive true;\n}
test_assert=proc test_%cursor%() -> bool {\n\tlet actual = %cursor%;\n\tlet expected = %cursor%;\n\tgive actual == expected;\n}
smoke=proc smoke() -> bool {\n\t%cursor%\n\tgive true;\n}
negative_test=proc test_%cursor%_must_fail() -> bool {\n\t%cursor%\n\tgive true;\n}
snapshot_test=proc test_%cursor%_snapshot() -> bool {\n\tlet actual: string = %cursor%;\n\tgive snapshot_matches("%cursor%", actual);\n}
parser_test=proc test_parser_%cursor%() -> bool {\n\tlet source: string = "%cursor%";\n\tlet result = parse(source);\n\tgive result.is_ok();\n}
type_error_test=proc test_%cursor%_type_error() -> bool {\n\tlet result = compile_fixture("%cursor%");\n\tgive result.has_diagnostic("VITTE-E0001");\n}
borrow_error_test=proc test_%cursor%_borrow_error() -> bool {\n\tlet result = compile_fixture("%cursor%");\n\tgive result.has_diagnostic("VITTE-E0001");\n}
assert_true=if not %cursor% {\n\tgive false;\n}
assert_eq=if %cursor% != %cursor% {\n\tgive false;\n}

