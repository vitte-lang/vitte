<text x="56" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">space vitte/stdlib/mod</text>
<text x="56" y="304" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">use vitte/stdlib/collections as coll</text>
<text x="56" y="346" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">use vitte/stdlib/io as io</text>
<text x="56" y="388" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">use vitte/stdlib/io/fileops.{ append_file, copy_file, create_directory, delete_directory, delete_file, file_exists, is_directory, is_file, list_directory, move_file, read_file, write_file }</text>
<text x="56" y="430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">form Vector&lt;T&gt; {</text>
<text x="56" y="472" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">  data: [T],</text>
