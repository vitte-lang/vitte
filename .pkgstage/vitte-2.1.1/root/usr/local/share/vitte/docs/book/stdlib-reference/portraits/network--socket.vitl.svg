<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
<title id="title">Stdlib portrait for network/socket.vitl</title>
<desc id="desc">Wiki-style portrait for stdlib module network/socket.vitl.</desc>
<rect width="640" height="640" rx="38" fill="#102033"/>
<rect x="18" y="18" width="604" height="604" rx="30" fill="none" stroke="#8dd3ff" stroke-opacity="0.35" stroke-width="2"/>
<circle cx="558" cy="84" r="42" fill="#8dd3ff" fill-opacity="0.16"/>
<circle cx="558" cy="84" r="24" fill="#8dd3ff" fill-opacity="0.92"/>
<text x="34" y="74" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#b9c4d8">stdlib module</text>
<text x="34" y="118" font-family="Georgia, Times New Roman, serif" font-size="38" font-weight="700" fill="#eef4ff">Socket</text>
<text x="34" y="148" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#b9c4d8">network/socket.vitl</text>
<rect x="34" y="168" width="188" height="34" rx="17" fill="#8dd3ff" fill-opacity="0.18"/>
<text x="50" y="190" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#8dd3ff">stdlib</text>
<rect x="34" y="222" width="572" height="316" rx="24" fill="#0f1726" fill-opacity="0.74" stroke="#8dd3ff" stroke-opacity="0.24"/>
<text x="56" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">space vitte/stdlib/network/socket</text>
<text x="56" y="304" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">export *</text>
<text x="56" y="346" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">form SocketAddress {</text>
<text x="56" y="388" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">  host: string</text>
<text x="56" y="430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">  port: u64</text>
<text x="56" y="472" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">}</text>
<text x="34" y="582" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#b9c4d8">Reference portrait for network/socket.vitl</text>
</svg>