<rect x="34" y="222" width="572" height="316" rx="24" fill="#0f1726" fill-opacity="0.74" stroke="#c7ceff" stroke-opacity="0.24"/>
<text x="56" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">space vitte/stdlib/math/matrix</text>
<text x="56" y="304" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">proc mat2(a: int, b: int, c: int, d: int) -&gt; [int] { give [a, b, c, d] }</text>
<text x="56" y="346" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">proc mat2_zero() -&gt; [int] { give [0, 0, 0, 0] }</text>
<text x="56" y="388" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">proc mat2_identity() -&gt; [int] { give [1, 0, 0, 1] }</text>
<text x="56" y="430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">proc mat2_diag(a: int, d: int) -&gt; [int] { give [a, 0, 0, d] }</text>
<text x="56" y="472" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" fill="#eef4ff">proc mat2_is_valid(m: [int]) -&gt; bool { give m.len == 4 }</text>
<text x="34" y="582" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#b9c4d8">Reference portrait for math/matrix.vitl</text>
