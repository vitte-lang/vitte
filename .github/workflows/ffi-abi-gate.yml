name: ffi-abi-gate

on:
  push:
  pull_request:

jobs:
  ffi-abi-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate ABI fixtures and profile coverage
        run: tools/ffi/validate_abi_profiles.py
      - name: Sync matrix ABI coverage section
        run: tools/ffi/update_matrix_abi_coverage.py
      - name: Ensure matrix is in sync with ABI artifacts
        run: |
          git diff --exit-code -- src/vitte/stdlib/STDLIB_COVERAGE_MATRIX.vitl
