name: roadmap-ecosystem-gate

on:
  push:
    paths:
      - "src/vitte/tools/**"
      - "src/vitte/compiler/performance/**"
      - "src/vitte/stdlib/network/**"
      - "src/vitte/stdlib/crypto/**"
      - "src/vitte/stdlib/json/**"
      - "tools/roadmap_ecosystem_check.py"
      - "COMPILER_ROADMAP.md"
      - "Makefile"
  pull_request:
    paths:
      - "src/vitte/tools/**"
      - "src/vitte/compiler/performance/**"
      - "src/vitte/stdlib/network/**"
      - "src/vitte/stdlib/crypto/**"
      - "src/vitte/stdlib/json/**"
      - "tools/roadmap_ecosystem_check.py"
      - "COMPILER_ROADMAP.md"
      - "Makefile"

jobs:
  roadmap-ecosystem-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run roadmap ecosystem gate
        run: make roadmap-ecosystem-gate
