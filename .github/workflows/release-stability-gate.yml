name: release-stability-gate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-stability-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build project
        run: make build

      - name: Run long-term stability suite
        run: make long-term-stability-suite

      - name: Upload release stability reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-stability-reports
          path: |
            build/reports/nightly.md
            build/reports/benchmarks.json
            build/reports/regressions.txt
            build/reports/stress.txt
          if-no-files-found: warn
