name: release-stability-gate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-stability-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build project
        run: make build

      - name: Run long-term stability suite
        run: make long-term-stability-suite

      - name: Enforce release gate 90-119
        run: make release-gate-90-119

      - name: Validate macOS release installer strictness
        run: STRICT_DMG=1 scripts_build/build-macos-installers.sh --dry-run

      - name: Enforce blocking installer release gate
        run: STRICT_REAL_INSTALLERS=1 RELEASE_INSTALLER_GATE=1 SBOM=1 SIGN=1 NOTARIZE=1 make release-installer-gate

      - name: Enforce installer shellcheck for release
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts_build/*.sh tools/scripts_build_*_test.sh

      - name: Upload release stability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-stability-reports
          path: |
            build/reports/nightly.md
            build/reports/benchmarks.json
            build/reports/regressions.txt
            build/reports/stress.txt
          if-no-files-found: warn
