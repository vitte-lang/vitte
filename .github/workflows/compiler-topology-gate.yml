name: compiler-topology-gate

on:
  push:
    paths:
      - "src/vitte/compiler/**"
      - "tools/compiler_topology/**"
      - "Makefile"
  pull_request:
    paths:
      - "src/vitte/compiler/**"
      - "tools/compiler_topology/**"
      - "Makefile"

jobs:
  compiler-topology-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run compiler topology gate
        run: make compiler-topology-gate
