name: architecture-docs-gate

on:
  push:
    paths:
      - "ARCHITECTURE_COMPLETE.md"
      - "ARCHITECTURE_INDEX.md"
      - "DELIVERY_SUMMARY.md"
      - "tools/architecture_docs_check.py"
      - "Makefile"
  pull_request:
    paths:
      - "ARCHITECTURE_COMPLETE.md"
      - "ARCHITECTURE_INDEX.md"
      - "DELIVERY_SUMMARY.md"
      - "tools/architecture_docs_check.py"
      - "Makefile"

jobs:
  architecture-docs-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check architecture docs
        run: make architecture-docs-check
