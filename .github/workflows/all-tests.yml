name: all-tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  all-tests-matrix:
    if: ${{ github.event_name != 'pull_request' || matrix.group == 'packages' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        group:
          - core
          - ci
          - abi
          - modules
          - packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install build deps
        run: |
          sudo apt-get update
          if [ -f toolchain/scripts/install/debian-deps.sh ]; then
            source toolchain/scripts/install/debian-deps.sh
            sudo apt-get install -y "${DEBIAN_APT_BUILD_DEPS[@]}"
          else
            sudo apt-get install -y clang g++ make pkg-config libssl-dev libcurl4-openssl-dev python3 python3-pip jq zsh fish
          fi

      - name: Build
        run: make build

      - name: Run all-tests group
        run: ALL_TESTS_GROUP=${{ matrix.group }} make all-tests

      - name: Upload all-tests reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-tests-reports-${{ matrix.group }}
          path: target/reports/all-tests
