name: all-tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  all-tests-matrix:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'push' && matrix.group != 'packages' }}
    timeout-minutes: 180
    env:
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONHASHSEED: "0"
    strategy:
      fail-fast: false
      matrix:
        group: ${{ github.event_name == 'pull_request' && fromJSON('["packages"]') || fromJSON('["core","ci-core","abi","modules","packages"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Clean workspace
        run: git clean -fdx

      - name: Install build deps
        run: |
          sudo apt-get update
          if [ -f toolchain/scripts/install/debian-deps.sh ]; then
            source toolchain/scripts/install/debian-deps.sh
            sudo apt-get install -y "${DEBIAN_APT_BUILD_DEPS[@]}"
          else
            sudo apt-get install -y clang g++ make pkg-config libssl-dev libcurl4-openssl-dev python3 python3-pip jq zsh fish
          fi
          sudo apt-get install -y zsh fish

      - name: Show shell versions
        run: |
          bash --version | head -n1 || true
          if command -v zsh >/dev/null 2>&1; then zsh --version; else echo "zsh not installed"; fi
          if command -v fish >/dev/null 2>&1; then fish --version; else echo "fish not installed"; fi

      - name: Build
        run: make build

      - name: Verify ci-group mapping
        run: make all-tests-ci-group-guard

      - name: Debug all-tests ci target list
        run: |
          git rev-parse HEAD
          rg -n "ci-core|ci-completions" .github/workflows/all-tests.yml
          ALL_TESTS_LIST_ONLY=1 ALL_TESTS_GROUP=ci tools/run_all_tests.sh

      - name: Run all-tests group (non-modules)
        if: matrix.group != 'modules' && matrix.group != 'ci-core'
        run: ALL_TESTS_GROUP=${{ matrix.group }} make all-tests

      - name: Run CI core gates (without completions)
        if: matrix.group == 'ci-core'
        run: |
          make grammar-check
          make ci-fast
          make ci-strict

      - name: Run modules suite (isolated snapshots gate)
        if: matrix.group == 'modules'
        run: |
          make modules-tests
          make modules-snapshots || (echo "[ci] retry modules-snapshots once" && make modules-snapshots)
          make modules-contract-snapshots
          make modules-ci-strict

      - name: Dump all-tests failure context
        if: failure()
        run: |
          set -euo pipefail
          REPORT_DIR="target/reports/all-tests"
          echo "::group::all-tests summaries"
          find "${REPORT_DIR}" -maxdepth 1 -type f -name 'summary_*' 2>/dev/null | LC_ALL=C.UTF-8 sort || true
          SUMMARY="$(find "${REPORT_DIR}" -maxdepth 1 -type f -name 'summary_*' 2>/dev/null | LC_ALL=C.UTF-8 sort | tail -n1 || true)"
          if [ -n "${SUMMARY}" ] && [ -f "${SUMMARY}" ]; then
            echo "Using summary: ${SUMMARY}"
            cat "${SUMMARY}"
          else
            echo "No summary file found in ${REPORT_DIR}"
          fi
          echo "::endgroup::"

          echo "::group::all-tests group logs"
          find "${REPORT_DIR}" -maxdepth 1 -type f -name "*_${{ matrix.group }}_*.log" 2>/dev/null | LC_ALL=C.UTF-8 sort || true
          while IFS= read -r f; do
            echo "--- ${f} (tail -n 160) ---"
            tail -n 160 "${f}" || true
          done < <(
            find "${REPORT_DIR}" -maxdepth 1 -type f -name "*_${{ matrix.group }}_*.log" 2>/dev/null | LC_ALL=C.UTF-8 sort | tail -n 12
          )
          echo "::endgroup::"

          FIRST_ERR="$(
            grep -RhoE '\[modules-snapshots\]\[error\].*' target/reports 2>/dev/null | head -n1 || true
          )"
          if [ -n "${FIRST_ERR}" ]; then
            echo "::error title=modules-snapshots mismatch::${FIRST_ERR}"
          fi

      - name: Normalize report logs
        if: always()
        run: |
          set -euo pipefail
          SRC_DIR="target/reports"
          DST_DIR="target/reports-normalized"
          mkdir -p "${DST_DIR}"
          [ -d "${SRC_DIR}" ] || exit 0
          find "${SRC_DIR}" -type f -name "*.log" -print0 | LC_ALL=C.UTF-8 sort -z | while IFS= read -r -d '' f; do
            rel="${f#${SRC_DIR}/}"
            out="${DST_DIR}/${rel}"
            mkdir -p "$(dirname "${out}")"
            sed -E \
              -e 's#/home/runner/work/[^ ]*#<GH_WORKSPACE>#g' \
              -e 's#/tmp/[^ ]*#<TMP_PATH>#g' \
              -e 's#\b[0-9a-f]{40}\b#<SHA1>#g' \
              -e 's#[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9:.+-]+#<ISO_TS>#g' \
              -e '/scanned files:/d' \
              "${f}" > "${out}"
          done

      - name: Upload all-tests reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-tests-reports-${{ matrix.group }}
          path: |
            target/reports
            target/reports-normalized

  ci-completions:
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: false
    timeout-minutes: 90
    env:
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONHASHSEED: "0"
      VITTE_COMPLETIONS_BIN: bin/vitte
      VITTE_COMPLETIONS_MODE: static
      VITTE_COMPLETIONS_SNAPSHOT_MODE: static
      CI_COMPLETIONS_RETRY_REMOVE_BY: "2026-03-22"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Clean workspace
        run: git clean -fdx

      - name: Install build deps
        run: |
          sudo apt-get update
          if [ -f toolchain/scripts/install/debian-deps.sh ]; then
            source toolchain/scripts/install/debian-deps.sh
            sudo apt-get install -y "${DEBIAN_APT_BUILD_DEPS[@]}"
          else
            sudo apt-get install -y clang g++ make pkg-config libssl-dev libcurl4-openssl-dev python3 python3-pip jq zsh fish
          fi
          sudo apt-get install -y zsh fish

      - name: Show shell versions
        run: |
          python3 --version
          bash --version | head -n1 || true
          if command -v zsh >/dev/null 2>&1; then zsh --version; else echo "zsh not installed"; fi
          if command -v fish >/dev/null 2>&1; then fish --version; else echo "fish not installed"; fi

      - name: Show runtime revision and workflow markers
        run: |
          git rev-parse HEAD
          rg -n "ci-core|ci-completions" .github/workflows/all-tests.yml

      - name: Build
        run: make build

      - name: Validate completions binary (strict)
        run: |
          set -euo pipefail
          echo "[ci-completions] VITTE_COMPLETIONS_BIN=${VITTE_COMPLETIONS_BIN}"
          [ -x "${VITTE_COMPLETIONS_BIN}" ] || {
            echo "::error title=ci-completions binary missing::${VITTE_COMPLETIONS_BIN} is missing or not executable"
            exit 1
          }

      - name: Print completions binary hash
        run: |
          set -euo pipefail
          sha256sum "${VITTE_COMPLETIONS_BIN}"

      - name: Print completions spec hash
        run: |
          set -euo pipefail
          sha256sum tools/completions/spec.json

      - name: Print completion mode
        run: python3 tools/generate_completions.py --print-mode

      - name: Ensure golden snapshots are tracked
        run: |
          set -euo pipefail
          git ls-files --error-unmatch tools/completions/snapshots/bash.vitte.golden
          git ls-files --error-unmatch tools/completions/snapshots/zsh._vitte.golden
          git ls-files --error-unmatch tools/completions/snapshots/fish.vitte.fish.golden

      - name: Run ci-completions (retry once)
        run: |
          set -euo pipefail
          mkdir -p target/reports/ci-completions
          LOG="target/reports/ci-completions/ci-completions.log"
          echo "[ci-completions] temporary retry enabled; remove after ${CI_COMPLETIONS_RETRY_REMOVE_BY} if stable"
          if ! make ci-completions 2>&1 | tee "$LOG"; then
            echo "[ci-completions] retry once"
            make ci-completions 2>&1 | tee -a "$LOG"
          fi
          cp "$LOG" "target/reports/ci-completions/ci-completions-${GITHUB_RUN_ID}.log"

      - name: Run verbose completion check (separate)
        run: python3 tools/generate_completions.py --check --verbose --mode "${VITTE_COMPLETIONS_MODE}"

      - name: Ensure snapshots are unchanged
        run: git diff --exit-code -- tools/completions/snapshots

      - name: Ensure generated completion files are unchanged
        run: git diff --exit-code -- completions/bash/vitte completions/zsh/_vitte completions/fish/vitte.fish

      - name: Show git status after completions
        if: always()
        run: git status --porcelain

      - name: Dump ci-completions debug context
        if: failure()
        run: |
          set -euo pipefail
          LOG="target/reports/ci-completions/ci-completions.log"
          tools/ci_completions_debug.sh "$LOG" || true

      - name: Normalize ci-completions logs
        if: always()
        run: |
          set -euo pipefail
          SRC_DIR="target/reports/ci-completions"
          DST_DIR="target/reports-normalized/ci-completions"
          mkdir -p "${DST_DIR}"
          [ -d "${SRC_DIR}" ] || exit 0
          find "${SRC_DIR}" -type f -name "*.log" -print0 | LC_ALL=C.UTF-8 sort -z | while IFS= read -r -d '' f; do
            rel="${f#${SRC_DIR}/}"
            out="${DST_DIR}/${rel}"
            mkdir -p "$(dirname "${out}")"
            sed -E \
              -e 's#/home/runner/work/[^ ]*#<GH_WORKSPACE>#g' \
              -e 's#/tmp/[^ ]*#<TMP_PATH>#g' \
              -e 's#\b[0-9a-f]{40}\b#<SHA1>#g' \
              -e 's#[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9:.+-]+#<ISO_TS>#g' \
              "${f}" > "${out}"
          done

      - name: Upload ci-completions artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-completions-artifacts
          path: |
            target/reports/ci-completions
            target/reports-normalized/ci-completions
            completions/bash/vitte
            completions/zsh/_vitte
            completions/fish/vitte.fish
            tools/completions/snapshots/*.golden

  ci-completions-dynamic:
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45
    env:
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONHASHSEED: "0"
      VITTE_COMPLETIONS_BIN: bin/vitte
      VITTE_COMPLETIONS_MODE: dynamic
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Clean workspace
        run: git clean -fdx

      - name: Install build deps
        run: |
          sudo apt-get update
          if [ -f toolchain/scripts/install/debian-deps.sh ]; then
            source toolchain/scripts/install/debian-deps.sh
            sudo apt-get install -y "${DEBIAN_APT_BUILD_DEPS[@]}"
          else
            sudo apt-get install -y clang g++ make pkg-config libssl-dev libcurl4-openssl-dev python3 python3-pip jq zsh fish
          fi
          sudo apt-get install -y zsh fish

      - name: Build
        run: make build

      - name: Dynamic completion probe (non-blocking temporary)
        run: |
          set -euo pipefail
          python3 tools/generate_completions.py --print-mode --mode dynamic
          python3 tools/generate_completions.py --check --verbose --mode dynamic
