name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fast CI gate
        run: make ci-fast

      - name: Upload grammar coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grammar-coverage-report
          path: target/reports/grammar_coverage/
          if-no-files-found: error

      - name: Run diagnostic contracts
        run: make diagnostic-quality

      - name: Check version compatibility
        run: make version-compatibility-gate

      - name: Validate installer package matrix
        run: scripts_build/package-matrix.sh list >/dev/null

      - name: Validate installer payload staging
        run: tools/scripts_build_staging_test.sh

      - name: Validate installer checksum fallback
        run: tools/scripts_build_checksum_fallback_test.sh

      - name: Validate installer staging reproducibility
        run: tools/scripts_build_reproducibility_test.sh

      - name: Validate package manager artifacts
        run: make package-manager-gate
