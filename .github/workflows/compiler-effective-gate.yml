name: compiler-effective-gate

on:
  pull_request:
    paths:
      - "src/vitte/compiler/**"
      - "tools/compiler_effective_gate/**"
      - ".github/workflows/compiler-effective-gate.yml"
  push:
    branches:
      - main
    paths:
      - "src/vitte/compiler/**"
      - "tools/compiler_effective_gate/**"
      - ".github/workflows/compiler-effective-gate.yml"

jobs:
  compiler-effective-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run compiler effective gate
        run: python3 tools/compiler_effective_gate/check.py
