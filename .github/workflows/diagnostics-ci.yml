name: Diagnostics CI

on:
  push:
    branches: [ main, 'i18n/**' ]
  pull_request:
    branches: [ main ]

jobs:
  diagnostics:
    name: Diagnostics checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Make Vitte binaries executable
        run: chmod +x ./bin/vitte ./bin/vittec0 || true

      - name: Run diagnostics locales check
        run: python3 tools/check_diagnostics_locales.py

      - name: Run diagnostics JSON test
        run: python3 tests/diag_json_output_test.py

      - name: Run diagnostic message snapshots
        run: python3 tests/diagnostics/run_renderer_tests.py

      - name: Check diagnostic message style
        run: python3 tools/check_diagnostic_message_style.py

      - name: Measure diagnostic precision
        run: python3 tests/diagnostics/measure_precision.py --fail-under 1.0

      - name: Run diagnostic quality gate
        run: make diagnostic-quality

      - name: Run portable diagnostic snapshots
        run: make diag-snapshots-portable

      - name: Run full diagnostics sweep
        run: python3 tests/validate_all_diagnostics.py
