name: driver-report-runtime-gate

on:
  push:
    paths:
      - "src/vitte/compiler/driver/**"
      - "src/vitte/compiler/frontend/**"
      - "src/vitte/compiler/analysis/**"
      - "src/vitte/compiler/backend/**"
      - "tools/driver_report_runtime_test.py"
      - "tools/frontend_syntax_check.py"
      - "tests/driver_report_runtime/**"
      - "Makefile"
  pull_request:
    paths:
      - "src/vitte/compiler/driver/**"
      - "src/vitte/compiler/frontend/**"
      - "src/vitte/compiler/analysis/**"
      - "src/vitte/compiler/backend/**"
      - "tools/driver_report_runtime_test.py"
      - "tools/frontend_syntax_check.py"
      - "tests/driver_report_runtime/**"
      - "Makefile"

jobs:
  driver-report-runtime-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run driver runtime report test
        run: make driver-report-runtime-test
