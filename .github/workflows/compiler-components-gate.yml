name: compiler-components-gate

on:
  push:
    paths:
      - "src/vitte/compiler/components/**"
      - "src/vitte/compiler/mod.vit"
      - "tools/compiler_components/**"
      - "Makefile"
  pull_request:
    paths:
      - "src/vitte/compiler/components/**"
      - "src/vitte/compiler/mod.vit"
      - "tools/compiler_components/**"
      - "Makefile"

jobs:
  compiler-components-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run compiler components gate
        run: make compiler-components-gate
