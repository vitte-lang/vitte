name: compiler-architecture-gate

on:
  push:
    paths:
      - "src/vitte/compiler/middle/**"
      - "src/vitte/compiler/backend/**"
      - "src/vitte/compiler/analysis/**"
      - "src/vitte/compiler/backends/**"
      - "src/vitte/compiler/catalog/**"
      - "src/vitte/compiler/components/**"
      - "src/vitte/compiler/concurrency/**"
      - "src/vitte/compiler/memory/**"
      - "src/vitte/compiler/optimizations/**"
      - "src/vitte/compiler/types/**"
      - "src/vitte/compiler/mod.vit"
      - "tools/compiler_arch/**"
      - "Makefile"
  pull_request:
    paths:
      - "src/vitte/compiler/middle/**"
      - "src/vitte/compiler/backend/**"
      - "src/vitte/compiler/analysis/**"
      - "src/vitte/compiler/backends/**"
      - "src/vitte/compiler/catalog/**"
      - "src/vitte/compiler/components/**"
      - "src/vitte/compiler/concurrency/**"
      - "src/vitte/compiler/memory/**"
      - "src/vitte/compiler/optimizations/**"
      - "src/vitte/compiler/types/**"
      - "src/vitte/compiler/mod.vit"
      - "tools/compiler_arch/**"
      - "Makefile"

jobs:
  compiler-architecture-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run compiler architecture gate
        run: make compiler-architecture-gate
