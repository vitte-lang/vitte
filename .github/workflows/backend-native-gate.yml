name: backend-native-gate

on:
  push:
    paths:
      - "src/vitte/compiler/backends/vitte_emit/**"
      - "src/vitte/compiler/backends/llvm_bindings/**"
      - "src/vitte/compiler/backends/wasm/**"
      - "src/vitte/compiler/backends/backend.vit"
      - "tools/vitte_emit/**"
      - "tools/ffi/validate_abi_profiles.py"
      - "Makefile"
  pull_request:
    paths:
      - "src/vitte/compiler/backends/vitte_emit/**"
      - "src/vitte/compiler/backends/llvm_bindings/**"
      - "src/vitte/compiler/backends/wasm/**"
      - "src/vitte/compiler/backends/backend.vit"
      - "tools/vitte_emit/**"
      - "tools/ffi/validate_abi_profiles.py"
      - "Makefile"

jobs:
  backend-native-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Vitte native backend gate
        run: make backend-native-gate
