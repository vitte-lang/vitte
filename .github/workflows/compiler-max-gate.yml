name: compiler-max-gate

on:
  pull_request:
    paths:
      - 'src/compiler/**'
      - 'tests/golden/frontend/**'
      - 'tools/compiler_max_gate.sh'
      - 'tools/pass_contract_audit.py'
      - 'tools/strict_recovery_smoke.sh'
      - 'tools/determinism_smoke.sh'
      - 'tools/incremental_cache_smoke.sh'
      - 'tools/golden_runner'
      - 'Makefile'
      - '.github/workflows/compiler-max-gate.yml'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  compiler-max-gate-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          if [ -f toolchain/scripts/install/debian-deps.sh ]; then
            source toolchain/scripts/install/debian-deps.sh
            sudo apt-get install -y "${DEBIAN_APT_BUILD_DEPS[@]}"
          else
            sudo apt-get install -y clang g++ make pkg-config libssl-dev libcurl4-openssl-dev python3 python3-pip jq zsh fish
          fi

      - name: Build
        run: make build

      - name: Run compiler max gate (fast)
        run: make compiler-max-gate-fast
