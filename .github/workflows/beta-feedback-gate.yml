name: beta-feedback-gate

on:
  push:
  pull_request:

jobs:
  beta-feedback-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate weekly feedback CSV schema
        run: tools/beta_feedback/validate_feedback_csv.py
      - name: Generate KPI reports and summary
        run: tools/beta_feedback/generate_kpi_report.py
      - name: Refresh matrix KPI lines from summary
        run: tools/beta_feedback/update_matrix_from_summary.py
      - name: Ensure matrix is in sync with generated KPI values
        run: |
          git diff --exit-code -- src/vitte/stdlib/STDLIB_COVERAGE_MATRIX.vitl
