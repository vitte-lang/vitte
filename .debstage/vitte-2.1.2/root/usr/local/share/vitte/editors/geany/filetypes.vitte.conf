# Vitte language support for Geany
# Install to: ~/.config/geany/filedefs/filetypes.vitte.conf

[styling]
lexer_filetype=CPP

# Base C-like mapping
default=default
comment=comment
commentline=commentline
commentdoc=commentdoc
number=number
word=keyword1
word2=keyword2
string=string
character=string
uuid=number
preprocessor=preprocessor
operator=operator
identifier=default
stringeol=stringeol
verbatim=string
regex=string_2
commentlinedoc=commentdoc
word3=keyword3
word4=keyword4
word5=keyword5
word6=keyword6
word7=keyword7
word8=keyword8
commentdockeyword=commentdockeyword
commentdockeyworderror=commentdockeyworderror
globalclass=type

[keywords]
primary=space pull use share const let make type form trait pick case proc entry at macro give emit asm unsafe if else otherwise loop for in break continue select when match return not and or is as
# Dedicated tokens: strict diagnostics/contracts + common *_pkg aliases.
secondary=proc form pick trait entry ROLE-CONTRACT VITTE core_pkg std_pkg fs_pkg db_pkg http_pkg http_client_pkg process_pkg test_pkg lint_pkg log_pkg json_pkg yaml_pkg
docComment=TODO FIXME NOTE XXX
typedefs=bool string int char i8 i16 i32 i64 isize u8 u16 u32 u64 usize f32 f64

[settings]
extension=vit
# Include '-' so tokens like VITTE-S0001 and ROLE-CONTRACT are single words.
wordchars=_abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-
comment_single=//
comment_open=/*
comment_close=*/
comment_use_indent=true
context_action_cmd=

[indentation]
width=2
type=1
hard_tab_width=8
detect_indent=false
detect_indent_width=false
indent_mode=2

[build-menu]
FT_00_LB=_Check
FT_00_CM=vitte check "%f"
FT_00_WD=%p
FT_01_LB=_Build
FT_01_CM=vitte build "%f"
FT_01_WD=%p
FT_02_LB=_Run
FT_02_CM=vitte run "%f"
FT_02_WD=%p
FT_03_LB=_Test
FT_03_CM=vitte test "%p"
FT_03_WD=%p
FT_04_LB=F_ormat
FT_04_CM=vitte fmt "%f"
FT_04_WD=%p
EX_00_LB=_Parse
EX_00_CM=vitte parse "%f"
EX_00_WD=%p
