<svg
  width="640"
  height="820"
  viewBox="0 0 640 820"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Vitte compact README hero</title>
  <desc id="desc">
    Compact mobile-friendly Vitte repository visual with terminal examples, compiler pipeline,
    diagnostics comparison, and a short syntax sample.
  </desc>

  <!-- Shared paint and typography -->
  <defs>
    <linearGradient id="bg" x1="38" y1="32" x2="606" y2="782" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1222"/>
      <stop offset="0.5" stop-color="#10203A"/>
      <stop offset="1" stop-color="#15445D"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F6EFE5" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0C1728"/>
      <stop offset="1" stop-color="#10263B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFB54A"/>
      <stop offset="1" stop-color="#FF6B3D"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#133452"/>
      <stop offset="1" stop-color="#0F6670"/>
    </linearGradient>
    <style>
      .title { font: 700 58px Georgia, 'Times New Roman', serif; fill: #102139; }
      .subtitle { font: 600 21px 'Avenir Next', 'Segoe UI', sans-serif; fill: #26445B; }
      .ui { font: 700 12px 'Avenir Next', 'Segoe UI', sans-serif; }
      .mono { font: 500 13px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
      .monoBold { font: 700 13px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
      .label { font: 700 13px 'Avenir Next', 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Frame -->
  <g id="frame">
    <rect width="640" height="820" rx="28" fill="url(#bg)"/>
    <rect x="36" y="34" width="568" height="752" rx="28" fill="url(#paper)"/>
  </g>

  <!-- Header -->
  <g id="header">
    <rect x="64" y="62" width="148" height="34" rx="17" fill="url(#accent)"/>
    <text x="138" y="84" class="ui" fill="#111827" text-anchor="middle">
      Experimental compiler
    </text>

    <text x="64" y="146" class="title">Vitte</text>
    <text x="64" y="180" class="subtitle">A systems language and compiler project</text>
    <text x="64" y="208" class="subtitle">that stays readable and explicit.</text>
  </g>

  <!-- Terminal check -->
  <g id="terminal-check">
    <rect x="64" y="236" width="512" height="100" rx="18" fill="url(#terminal)"/>
    <rect x="64" y="236" width="512" height="26" rx="18" fill="#152A40"/>
    <rect x="64" y="248" width="512" height="14" fill="#152A40"/>
    <text x="320" y="254" class="ui" fill="#BDD4DE" text-anchor="middle">terminal</text>
    <text x="82" y="287" class="monoBold" fill="#63E6BE">$</text>
    <text x="100" y="287" class="mono" fill="#F3F7FA">
      bin/vitte check src/vitte/compiler/main.vit
    </text>
    <text x="82" y="316" class="mono" fill="#8DC1D5">check succeeded</text>
  </g>

  <!-- Terminal diagnostics json -->
  <g id="terminal-json">
    <rect x="64" y="356" width="512" height="108" rx="18" fill="url(#terminal)"/>
    <rect x="64" y="356" width="512" height="26" rx="18" fill="#152A40"/>
    <rect x="64" y="368" width="512" height="14" fill="#152A40"/>
    <text x="320" y="374" class="ui" fill="#BDD4DE" text-anchor="middle">diagnostics json</text>
    <text x="82" y="408" class="monoBold" fill="#63E6BE">$</text>
    <text x="100" y="408" class="mono" fill="#F3F7FA">
      bin/vitte check main.vit --diagnostics-json
    </text>
    <text x="82" y="436" class="mono" fill="#F8C56C">{ "pipeline_failed_at": "none" }</text>
  </g>

  <!-- Pipeline -->
  <g id="pipeline">
    <text x="64" y="500" class="label" fill="#28445C">pipeline</text>
    <rect x="64" y="516" width="72" height="22" rx="11" fill="url(#chip)"/>
    <rect x="146" y="516" width="76" height="22" rx="11" fill="url(#chip)"/>
    <rect x="232" y="516" width="58" height="22" rx="11" fill="url(#chip)"/>
    <rect x="300" y="516" width="42" height="22" rx="11" fill="url(#chip)"/>
    <rect x="352" y="516" width="84" height="22" rx="11" fill="url(#accent)"/>
    <text x="100" y="531" class="ui" fill="#EFF8FA" text-anchor="middle">lexer</text>
    <text x="184" y="531" class="ui" fill="#EFF8FA" text-anchor="middle">parser</text>
    <text x="261" y="531" class="ui" fill="#EFF8FA" text-anchor="middle">MIR</text>
    <text x="321" y="531" class="ui" fill="#EFF8FA" text-anchor="middle">IR</text>
    <text x="394" y="531" class="ui" fill="#111827" text-anchor="middle">backend</text>
  </g>

  <!-- Diagnostics compare -->
  <g id="diagnostics-compare">
    <rect x="64" y="560" width="244" height="122" rx="18" fill="#FFF4F2"/>
    <rect x="332" y="560" width="244" height="122" rx="18" fill="#EEF8F1"/>
    <text x="82" y="586" class="label" fill="#A33F2F">before</text>
    <text x="350" y="586" class="label" fill="#257346">after</text>
    <text x="82" y="616" class="mono" fill="#B25543">validation failed</text>
    <text x="82" y="642" class="mono" fill="#C77A69">stage unknown</text>
    <text x="350" y="616" class="mono" fill="#257346">pipeline_failed_at: ir_validate</text>
    <text x="350" y="642" class="mono" fill="#36657A">validation_reason: invalid-call-abi</text>
  </g>

  <!-- Syntax -->
  <g id="syntax-sample">
    <rect x="64" y="704" width="512" height="72" rx="18" fill="url(#terminal)"/>
    <text x="82" y="730" class="label" fill="#BDD4DE">Vitte syntax</text>
    <text x="82" y="754" class="mono" fill="#69A9FF">proc</text>
    <text x="118" y="754" class="mono" fill="#F4F7FA">main</text>
    <text x="154" y="754" class="mono" fill="#A7BECD">()</text>
    <text x="176" y="754" class="mono" fill="#F4F7FA">-&gt;</text>
    <text x="200" y="754" class="mono" fill="#8BE28B">int</text>
    <text x="228" y="754" class="mono" fill="#A7BECD">{</text>
    <text x="82" y="772" class="mono" fill="#69A9FF">give</text>
    <text x="118" y="772" class="mono" fill="#FFCC80">0</text>
    <text x="128" y="772" class="mono" fill="#A7BECD">; }</text>
  </g>
</svg>
