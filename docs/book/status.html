<a class="skip-link" href="#main-content">Skip to content</a><div class="site-shell"><main id="main-content" class="site-main"><article class="doc-content"><h1>Book Status</h1><p>Coverage, completeness, and checks are generated from chapters metadata.</p><pre id="book-status-out">loading…</pre></article></main></div><script>fetch("chapters-meta.json").then(r=>r.json()).then(d=>{const c=d.chapters||[];const lv={beginner:0,intermediate:0,advanced:0};c.forEach(x=>lv[x.level]=(lv[x.level]||0)+1);document.getElementById("book-status-out").textContent=JSON.stringify({chapters:c.length,levels:lv,essential:c.filter(x=>x.essential).length},null,2);});</script><script type="module" src="/js/main.js"></script>
